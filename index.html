<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMN Live Banking System</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#101010;
    color:white;
}

header{
    background:#7b0000;
    padding:20px;
    text-align:center;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

.card{
    background:#1c1c1c;
    border:2px solid #0f8f3f;
    border-radius:14px;
    padding:20px;
    margin-bottom:20px;
}

input, select, button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    font-size:16px;
}

input, select{
    background:#2b2b2b;
    color:white;
}

button{
    background:#0f8f3f;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#14b84f;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td{
    padding:12px;
    border-bottom:1px solid #333;
}

th{
    background:#222;
}

.status{
    padding:12px;
    background:#0f3f1f;
    border-left:5px solid #00ff66;
    margin-top:15px;
}
</style>
</head>

<body>

<header>
<h1>🏦 UNITED MELON NATIONS LIVE BANK</h1>
<p>Live Transfers • Saved Data • Infinite Treasury</p>
</header>

<div class="container">

<div class="card">
<h2>Create Citizen</h2>

<input type="text" id="newCitizen" placeholder="Citizen Name">

<button onclick="createCitizen()">
Create Citizen Account
</button>

<div class="status">
✔ Data is automatically saved in browser storage.
</div>
</div>

<div class="card">
<h2>Live Transfer Seeds</h2>

<select id="sender"></select>

<select id="receiver"></select>

<input type="number" id="transferAmount"
placeholder="Seeds Amount">

<button onclick="transferSeeds()">
Send Seeds
</button>
</div>

<div class="card">
<h2>Citizen Accounts</h2>

<table>
<thead>
<tr>
<th>Citizen</th>
<th>Seeds</th>
<th>Crowns</th>
</tr>
</thead>

<tbody id="citizenTable"></tbody>
</table>

</div>
</div>

<script>

let citizens = JSON.parse(
localStorage.getItem("umnCitizens")
) || [

{
    name:"Elliot Davies",
    seeds:5000,
    crowns:50
},

{
    name:"Keng Macsen",
    seeds:3000,
    crowns:30
}

];

function saveData(){

    localStorage.setItem(
        "umnCitizens",
        JSON.stringify(citizens)
    );
}

function renderCitizens(){

    const table =
    document.getElementById("citizenTable");

    const sender =
    document.getElementById("sender");

    const receiver =
    document.getElementById("receiver");

    table.innerHTML = "";
    sender.innerHTML = "";
    receiver.innerHTML = "";

    citizens.forEach((citizen,index)=>{

        table.innerHTML += `
        <tr>
            <td>${citizen.name}</td>
            <td>🌱 ${citizen.seeds.toLocaleString()}</td>
            <td>👑 ${citizen.crowns.toLocaleString()}</td>
        </tr>
        `;

        sender.innerHTML += `
        <option value="${index}">
            ${citizen.name}
        </option>
        `;

        receiver.innerHTML += `
        <option value="${index}">
            ${citizen.name}
        </option>
        `;
    });

    saveData();
}

function createCitizen(){

    const name =
    document.getElementById("newCitizen")
    .value.trim();

    if(!name){

        alert("Enter a citizen name.");
        return;
    }

    citizens.push({

        name:name,
        seeds:1000,
        crowns:10
    });

    document.getElementById("newCitizen")
    .value = "";

    renderCitizens();

    alert(name + " joined the United Melon Nations!");
}

function transferSeeds(){

    const senderIndex = Number(
        document.getElementById("sender").value
    );

    const receiverIndex = Number(
        document.getElementById("receiver").value
    );

    const amount = Number(
        document.getElementById("transferAmount").value
    );

    if(senderIndex === receiverIndex){

        alert("Choose different citizens.");
        return;
    }

    if(amount <= 0){

        alert("Enter a valid amount.");
        return;
    }

    if(citizens[senderIndex].seeds < amount){

        alert("Not enough seeds.");
        return;
    }

    citizens[senderIndex].seeds -= amount;

    citizens[receiverIndex].seeds += amount;

    renderCitizens();

    document.getElementById("transferAmount")
    .value = "";

    alert(
        citizens[senderIndex].name +
        " sent " +
        amount.toLocaleString() +
        " Seeds to " +
        citizens[receiverIndex].name
    );
}

renderCitizens();

</script>

</body>
</html>
